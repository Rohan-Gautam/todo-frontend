<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Modern Blue to Purple Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" /> 
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- App Icon Rounded Square Background -->
  <rect width="512" height="512" rx="120" fill="url(#bgGrad)"/>
  
  <!-- The 'Task' Checkmark -->
  <path d="M150 260 L220 330 L350 180" fill="none" stroke="#ffffff" stroke-width="48" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- The 'Sketch' Pencil Dot -->
  <circle cx="390" cy="140" r="24" fill="#ffffff"/>
</svg>
